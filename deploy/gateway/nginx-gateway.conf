# ===== HTTP: только challenge + редирект на HTTPS =====

server {
  listen 80;
  server_name staging.connectpix.site;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 80;
  server_name connectpix.site www.connectpix.site;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ===== HTTPS: проксирование внутрь Docker сети =====

server {
  listen 443 ssl;
  server_name staging.connectpix.site;

  ssl_certificate     /etc/letsencrypt/live/connectpix.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/connectpix.site/privkey.pem;

  location / {
    proxy_pass http://staging_web:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  server_name connectpix.site www.connectpix.site;

  ssl_certificate     /etc/letsencrypt/live/connectpix.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/connectpix.site/privkey.pem;

  location / {
    proxy_pass http://prod_web:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
